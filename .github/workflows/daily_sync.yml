name: Daily Model Sync

on:
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC daily
  push:
    branches:
      - main # Trigger on push to main for testing
  workflow_dispatch: # Allow manual triggers

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run sync script
        run: python sync_models.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_models.json models/*.json list.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated model sync $(date +'%Y-%m-%d')" && git push)
